spring.application.name=onlinebiodatamaker
#server.port=9595
server.port=${PORT:9595}

spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/resources

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

app.generated.dir=${user.home}/templatemaker/generated

spring.messages.basename=messages
spring.messages.encoding=UTF-8
server.address=0.0.0.0


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}
razorpay.currency=INR
biodata.price.base=${BIODATA_BASE_PRICE}
biodata.price.couponDiscount=${BIODATA_COUPON_DISCOUNT}
biodata.price.couponCode=${BIODATA_COUPON_CODE}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
